model:
  objective: binary:logistic
  eval_metric: auc
  tree_method: hist
  n_jobs: -1
  random_state: 42

defaults:
  max_depth: 6
  learning_rate: 0.05
  n_estimators: 400
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  reg_alpha: 0.0
  reg_lambda: 1.0

optuna:
  n_trials: 50
  n_folds: 3
  direction: maximize
  metric: auc_roc
  pruner: MedianPruner

cv:
  n_folds: 5
  shuffle: true
  random_state: 42

mlflow:
  tracking_uri: http://localhost:5001
  experiment_name: fraud-xgboost
  registered_model_name: fraud-xgboost

output:
  model_path: models/xgb_model.json

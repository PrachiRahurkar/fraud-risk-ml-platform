<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3300" height="2550" viewBox="0 0 3300 2550" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Fraud Risk Detection Platform - System Design</title>
  <desc id="desc">One-page printable system design diagram for an end-to-end fraud risk detection platform with training, inference, feedback, monitoring, and deployment layers.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#15803d"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#b45309"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 70px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 34px Arial, Helvetica, sans-serif; fill: #475569; }
      .meta { font: 400 28px Arial, Helvetica, sans-serif; fill: #64748b; }
      .section { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 3; rx: 26; }
      .section-title { font: 700 42px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .section-note { font: 400 28px Arial, Helvetica, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 3; rx: 18; filter: url(#soft-shadow); }
      .box-blue { fill: #eff6ff; stroke: #60a5fa; }
      .box-green { fill: #ecfdf5; stroke: #34d399; }
      .box-orange { fill: #fff7ed; stroke: #fb923c; }
      .box-purple { fill: #f5f3ff; stroke: #a78bfa; }
      .box-red { fill: #fef2f2; stroke: #f87171; }
      .box-gray { fill: #f8fafc; stroke: #94a3b8; }
      .small-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2.5; rx: 14; }
      .label { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label-sm { font: 700 29px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .body { font: 400 27px Arial, Helvetica, sans-serif; fill: #334155; }
      .body-sm { font: 400 23px Arial, Helvetica, sans-serif; fill: #475569; }
      .mono { font: 400 23px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #334155; }
      .pill { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .pill-text { font: 700 20px Arial, Helvetica, sans-serif; fill: #334155; letter-spacing: 0.6px; }
      .arrow { fill: none; stroke: #334155; stroke-width: 5; marker-end: url(#arrow); }
      .arrow-blue { fill: none; stroke: #1d4ed8; stroke-width: 5; marker-end: url(#arrow-blue); }
      .arrow-green { fill: none; stroke: #15803d; stroke-width: 5; marker-end: url(#arrow-green); }
      .arrow-orange { fill: none; stroke: #b45309; stroke-width: 5; marker-end: url(#arrow-orange); }
      .arrow-dashed { fill: none; stroke: #64748b; stroke-width: 4; stroke-dasharray: 14 12; marker-end: url(#arrow); }
      .arrow-label { font: 700 22px Arial, Helvetica, sans-serif; fill: #334155; }
      .badge { fill: #0f172a; rx: 16; }
      .badge-text { font: 700 21px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .legend-title { font: 700 25px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .legend-text { font: 400 23px Arial, Helvetica, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="3300" height="2550"/>

  <!-- Header -->
  <text class="title" x="110" y="132">Fraud Risk Detection Platform</text>
  <text class="subtitle" x="112" y="188">End-to-end system design: multimodal ML inference, reviewer workflow, drift monitoring, and retraining</text>
  <text class="meta" x="112" y="232">React + GraphQL BFF + FastAPI + XGBoost + LoRA Gemma-2B + Spark + Kafka + MLflow + GCP</text>

  <rect x="2300" y="72" width="890" height="170" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2.5"/>
  <text class="legend-title" x="2340" y="116">Legend</text>
  <line class="arrow-blue" x1="2340" y1="152" x2="2465" y2="152"/>
  <text class="legend-text" x="2490" y="160">Request / response</text>
  <line class="arrow-green" x1="2340" y1="194" x2="2465" y2="194"/>
  <text class="legend-text" x="2490" y="202">Labels / feedback</text>
  <line class="arrow-orange" x1="2765" y1="152" x2="2890" y2="152"/>
  <text class="legend-text" x="2915" y="160">Training artifacts</text>
  <line class="arrow-dashed" x1="2765" y1="194" x2="2890" y2="194"/>
  <text class="legend-text" x="2915" y="202">Async logs / alerts</text>

  <!-- Training Section -->
  <rect class="section" x="80" y="285" width="3140" height="650"/>
  <text class="section-title" x="120" y="348">1. Offline Training and Evaluation</text>
  <text class="section-note" x="120" y="390">Raw campaign data is cleaned, featurized, trained through two complementary models, evaluated, and published as versioned artifacts.</text>

  <rect class="box box-blue" x="130" y="455" width="390" height="245"/>
  <text class="label" x="160" y="510">Data Sources</text>
  <text class="body" x="160" y="558">Campaign metadata</text>
  <text class="body" x="160" y="594">Title + description text</text>
  <text class="body" x="160" y="630">Human labels</text>
  <rect class="pill" x="160" y="652" width="128" height="34"/>
  <text class="pill-text" x="179" y="676">CSV</text>
  <rect class="pill" x="302" y="652" width="162" height="34"/>
  <text class="pill-text" x="322" y="676">fund_id</text>

  <rect class="box box-blue" x="570" y="455" width="310" height="245"/>
  <text class="label" x="600" y="510">Kafka</text>
  <text class="body" x="600" y="558">Ingest and buffer</text>
  <text class="body" x="600" y="594">training records</text>
  <text class="mono" x="600" y="642">fraud-risk.raw</text>

  <rect class="box box-blue" x="930" y="455" width="380" height="245"/>
  <text class="label" x="960" y="510">Spark ETL</text>
  <text class="body" x="960" y="558">Strip HTML, impute nulls</text>
  <text class="body" x="960" y="594">Encode categories</text>
  <text class="body" x="960" y="630">Engineer 12 features</text>
  <rect class="pill" x="960" y="652" width="160" height="34"/>
  <text class="pill-text" x="981" y="676">PySpark</text>

  <rect class="box box-blue" x="1360" y="455" width="390" height="245"/>
  <text class="label" x="1390" y="510">Feature Store</text>
  <text class="body" x="1390" y="558">Structured features</text>
  <text class="body" x="1390" y="594">Clean text prompts</text>
  <text class="body" x="1390" y="630">Train / val / test split</text>
  <text class="mono" x="1390" y="674">Parquet / GCS</text>

  <rect class="box box-orange" x="1830" y="380" width="430" height="225"/>
  <text class="label" x="1860" y="435">XGBoost Trainer</text>
  <text class="body" x="1860" y="483">Ray Train + Optuna</text>
  <text class="body" x="1860" y="519">5-fold stratified CV</text>
  <text class="body" x="1860" y="555">AUC objective</text>
  <text class="mono" x="1860" y="588">xgb_model.json</text>

  <rect class="box box-orange" x="1830" y="650" width="430" height="225"/>
  <text class="label" x="1860" y="705">LoRA Trainer</text>
  <text class="body" x="1860" y="753">Gemma-2B text model</text>
  <text class="body" x="1860" y="789">PEFT adapters</text>
  <text class="body" x="1860" y="825">GCP T4 GPU</text>
  <text class="mono" x="1860" y="858">lora-adapters/</text>

  <rect class="box box-purple" x="2360" y="500" width="390" height="245"/>
  <text class="label" x="2390" y="555">Evaluation</text>
  <text class="body" x="2390" y="603">AUC, PR-AUC, F1</text>
  <text class="body" x="2390" y="639">Bias slices</text>
  <text class="body" x="2390" y="675">SHAP top features</text>
  <text class="mono" x="2390" y="718">MLflow metrics</text>

  <rect class="box box-green" x="2820" y="430" width="330" height="315"/>
  <text class="label" x="2850" y="485">Model Artifacts</text>
  <text class="body" x="2850" y="533">XGBoost model</text>
  <text class="body" x="2850" y="569">LoRA adapter</text>
  <text class="body" x="2850" y="605">SHAP store JSON</text>
  <text class="body" x="2850" y="641">Threshold + weights</text>
  <text class="mono" x="2850" y="698">gs://fraud-risk-models</text>

  <line class="arrow-blue" x1="520" y1="577" x2="570" y2="577"/>
  <line class="arrow-blue" x1="880" y1="577" x2="930" y2="577"/>
  <line class="arrow-blue" x1="1310" y1="577" x2="1360" y2="577"/>
  <path class="arrow-orange" d="M 1750 540 C 1780 510 1790 492 1830 492"/>
  <path class="arrow-orange" d="M 1750 615 C 1780 685 1790 762 1830 762"/>
  <path class="arrow-orange" d="M 2260 492 C 2300 510 2320 560 2360 585"/>
  <path class="arrow-orange" d="M 2260 762 C 2300 744 2320 690 2360 660"/>
  <line class="arrow-orange" x1="2750" y1="622" x2="2820" y2="622"/>

  <!-- Inference Section -->
  <rect class="section" x="80" y="990" width="2050" height="875"/>
  <text class="section-title" x="120" y="1053">2. Online Inference Path</text>
  <text class="section-note" x="120" y="1095">Reviewers use one UI; the BFF hides service topology and routes model, metrics, queue, and feedback calls.</text>

  <rect class="box box-blue" x="130" y="1160" width="420" height="265"/>
  <text class="label" x="160" y="1215">React Reviewer UI</text>
  <text class="body" x="160" y="1263">Campaign Scorer</text>
  <text class="body" x="160" y="1299">Fraud Queue</text>
  <text class="body" x="160" y="1335">Model Metrics</text>
  <text class="body" x="160" y="1371">Explainability</text>
  <rect class="pill" x="160" y="1391" width="125" height="34"/>
  <text class="pill-text" x="181" y="1415">5173</text>

  <rect class="box box-blue" x="625" y="1160" width="420" height="265"/>
  <text class="label" x="655" y="1215">GraphQL BFF</text>
  <text class="body" x="655" y="1263">Apollo Server 4</text>
  <text class="body" x="655" y="1299">Auth, CORS, rate limits</text>
  <text class="body" x="655" y="1335">Aggregates REST + gRPC</text>
  <text class="mono" x="655" y="1388">scoreCampaign()</text>
  <rect class="pill" x="892" y="1391" width="125" height="34"/>
  <text class="pill-text" x="913" y="1415">4000</text>

  <rect class="box box-green" x="1125" y="1125" width="900" height="645"/>
  <text class="label" x="1160" y="1182">FastAPI ML Serving API</text>
  <text class="section-note" x="1160" y="1224">Owns inference, model loading, score fusion, and explanations</text>
  <rect class="pill" x="1817" y="1150" width="125" height="34"/>
  <text class="pill-text" x="1838" y="1174">8000</text>

  <rect class="small-box" x="1170" y="1270" width="370" height="145"/>
  <text class="label-sm" x="1195" y="1312">XGBoost Inference</text>
  <text class="body-sm" x="1195" y="1352">Structured 12-feature model</text>
  <text class="body-sm" x="1195" y="1385">Loaded at startup</text>

  <rect class="small-box" x="1610" y="1270" width="370" height="145"/>
  <text class="label-sm" x="1635" y="1312">LoRA Inference</text>
  <text class="body-sm" x="1635" y="1352">Gemma-2B adapter</text>
  <text class="body-sm" x="1635" y="1385">Lazy-loaded on first ensemble</text>

  <rect class="small-box" x="1170" y="1460" width="370" height="145"/>
  <text class="label-sm" x="1195" y="1502">Weighted Ensemble</text>
  <text class="body-sm" x="1195" y="1542">0.65 x XGB + 0.35 x LoRA</text>
  <text class="body-sm" x="1195" y="1575">Threshold defaults to 0.5</text>

  <rect class="small-box" x="1610" y="1460" width="370" height="145"/>
  <text class="label-sm" x="1635" y="1502">SHAP Lookup</text>
  <text class="body-sm" x="1635" y="1542">Top-3 feature drivers</text>
  <text class="body-sm" x="1635" y="1575">O(1) JSON lookup by fund_id</text>

  <rect class="small-box" x="1285" y="1640" width="580" height="92" fill="#ecfdf5"/>
  <text class="label-sm" x="1315" y="1680">Prediction Response</text>
  <text class="body-sm" x="1315" y="1713">fraud_score, label, confidence, explanation</text>

  <line class="arrow-blue" x1="550" y1="1292" x2="625" y2="1292"/>
  <text class="arrow-label" x="555" y="1248">GraphQL</text>
  <line class="arrow-blue" x1="1045" y1="1292" x2="1125" y2="1292"/>
  <text class="arrow-label" x="1061" y="1265">REST</text>
  <path class="arrow-blue" d="M 1575 1732 C 1320 1810 765 1788 505 1425"/>
  <text class="arrow-label" x="820" y="1810">score + reviewer-facing explanation returned to UI</text>

  <path class="arrow-orange" d="M 2985 745 C 2985 950 2185 1035 1940 1265"/>
  <text class="arrow-label" x="2380" y="976">model artifacts loaded by serving API</text>

  <!-- Observability Section -->
  <rect class="section" x="2170" y="990" width="1050" height="875"/>
  <text class="section-title" x="2210" y="1053">3. Monitoring and Feedback</text>
  <text class="section-note" x="2210" y="1095">Production behavior and reviewer decisions flow back into monitoring, alerts, and retraining.</text>

  <rect class="box box-purple" x="2225" y="1160" width="425" height="175"/>
  <text class="label-sm" x="2255" y="1212">Inference Logs</text>
  <text class="body-sm" x="2255" y="1250">Prediction requests + scores</text>
  <text class="body-sm" x="2255" y="1282">Stored as JSONL in GCS</text>
  <text class="mono" x="2255" y="1317">fraud-risk-logs/</text>

  <rect class="box box-purple" x="2735" y="1160" width="420" height="175"/>
  <text class="label-sm" x="2765" y="1212">Monitoring Service</text>
  <text class="body-sm" x="2765" y="1250">Evidently drift reports</text>
  <text class="body-sm" x="2765" y="1282">Rolling AUC, precision@K</text>
  <rect class="pill" x="3002" y="1292" width="125" height="34"/>
  <text class="pill-text" x="3023" y="1316">50052</text>

  <rect class="box box-red" x="2735" y="1410" width="420" height="175"/>
  <text class="label-sm" x="2765" y="1462">Alerts and Reports</text>
  <text class="body-sm" x="2765" y="1500">Feature drift p &lt; 0.05</text>
  <text class="body-sm" x="2765" y="1532">AUC drop &gt; 3%</text>
  <text class="body-sm" x="2765" y="1564">Dashboard summary</text>

  <rect class="box box-green" x="2225" y="1410" width="425" height="175"/>
  <text class="label-sm" x="2255" y="1462">Human Review</text>
  <text class="body-sm" x="2255" y="1500">Reviewer verdict</text>
  <text class="body-sm" x="2255" y="1532">fraud / legitimate</text>
  <text class="body-sm" x="2255" y="1564">Confidence + notes</text>

  <rect class="box box-green" x="2225" y="1640" width="425" height="175"/>
  <text class="label-sm" x="2255" y="1692">Feedback Service</text>
  <text class="body-sm" x="2255" y="1730">gRPC SubmitLabel</text>
  <text class="body-sm" x="2255" y="1762">Writes verified labels</text>
  <rect class="pill" x="2488" y="1772" width="125" height="34"/>
  <text class="pill-text" x="2509" y="1796">50051</text>

  <rect class="box box-green" x="2735" y="1640" width="420" height="175"/>
  <text class="label-sm" x="2765" y="1692">Retraining Trigger</text>
  <text class="body-sm" x="2765" y="1730">Kafka labels topic</text>
  <text class="body-sm" x="2765" y="1762">&gt;= 100 new labels</text>
  <text class="mono" x="2765" y="1797">fraud-risk.labels</text>

  <line class="arrow-dashed" x1="2025" y1="1415" x2="2225" y2="1248"/>
  <line class="arrow-dashed" x1="2650" y1="1248" x2="2735" y2="1248"/>
  <line class="arrow-dashed" x1="2945" y1="1335" x2="2945" y2="1410"/>
  <path class="arrow-blue" d="M 2735 1498 C 2470 1498 2230 1470 2025 1370"/>
  <text class="arrow-label" x="2350" y="1395">metrics + drift shown in UI</text>
  <line class="arrow-green" x1="2438" y1="1585" x2="2438" y2="1640"/>
  <line class="arrow-green" x1="2650" y1="1728" x2="2735" y2="1728"/>
  <path class="arrow-green" d="M 2945 1640 C 2945 990 2365 900 2190 830"/>
  <text class="arrow-label" x="2520" y="928">new labels re-enter training</text>

  <!-- Infrastructure Section -->
  <rect class="section" x="80" y="1940" width="3140" height="500"/>
  <text class="section-title" x="120" y="2003">4. Deployment, Runtime, and Contracts</text>
  <text class="section-note" x="120" y="2045">The same components run locally with Docker Compose and deploy independently with Cloud Build; contracts keep services loosely coupled.</text>

  <rect class="box box-gray" x="130" y="2110" width="560" height="245"/>
  <text class="label" x="160" y="2165">Local Runtime</text>
  <text class="body" x="160" y="2213">Docker Compose stack</text>
  <text class="body" x="160" y="2249">Zookeeper + Kafka</text>
  <text class="body" x="160" y="2285">Spark master + worker</text>
  <text class="body" x="160" y="2321">MLflow + app services</text>

  <rect class="box box-gray" x="760" y="2110" width="560" height="245"/>
  <text class="label" x="790" y="2165">Cloud Deployment</text>
  <text class="body" x="790" y="2213">Cloud Build per service</text>
  <text class="mono" x="790" y="2250">cloudbuild-api.yaml</text>
  <text class="mono" x="790" y="2284">cloudbuild-bff.yaml</text>
  <text class="mono" x="790" y="2318">cloudbuild-frontend.yaml</text>

  <rect class="box box-gray" x="1390" y="2110" width="560" height="245"/>
  <text class="label" x="1420" y="2165">Storage Plane</text>
  <text class="body" x="1420" y="2213">Model artifacts</text>
  <text class="body" x="1420" y="2249">LoRA adapters</text>
  <text class="body" x="1420" y="2285">Inference logs</text>
  <text class="body" x="1420" y="2321">Drift reports</text>

  <rect class="box box-gray" x="2020" y="2110" width="560" height="245"/>
  <text class="label" x="2050" y="2165">Quality Gates</text>
  <text class="body" x="2050" y="2213">Model metrics in MLflow</text>
  <text class="body" x="2050" y="2249">Bias slice evaluation</text>
  <text class="body" x="2050" y="2285">Drift and AUC alerts</text>
  <text class="body" x="2050" y="2321">Reviewer feedback loop</text>

  <rect class="box box-gray" x="2650" y="2110" width="470" height="245"/>
  <text class="label" x="2680" y="2165">Service Contracts</text>
  <text class="body" x="2680" y="2213">GraphQL: UI to BFF</text>
  <text class="body" x="2680" y="2249">REST: BFF to ML API</text>
  <text class="body" x="2680" y="2285">gRPC/protobuf: services</text>
  <text class="body" x="2680" y="2321">Kafka topics: events</text>

  <!-- Footer -->
  <text class="meta" x="110" y="2498">Print settings: landscape, fit to page, white background. Main ports: UI 5173, BFF 4000, ML API 8000, Feedback gRPC 50051, Monitoring gRPC 50052.</text>
</svg>

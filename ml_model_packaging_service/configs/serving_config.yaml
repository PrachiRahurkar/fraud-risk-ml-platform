models:
  xgb_model_path: models/xgb_model.json
  shap_store_path: models/shap_store.json
  lora_adapter_path: ""        # set to models/lora-adapter or gs:// path when available

ensemble:
  w_lora: 0.0                  # 0.0 = XGBoost only until LoRA is trained
  fraud_threshold: 0.5         # overridden by learned Youden-J threshold post-eval

api:
  host: 0.0.0.0
  port: 8000
  workers: 2

bff:
  port: 4000
  ml_api_url: http://localhost:8000
  feedback_svc_url: localhost:50051
  monitoring_svc_url: localhost:50052
  graphql_url: http://localhost:4000/graphql

frontend:
  port: 5173
  graphql_url: http://localhost:4000/graphql
